<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Engine Saham Pribadi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9;}
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 16px;}
        button:hover { background-color: #218838; }
        .note { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Tarik Data Saham Yahoo Finance</h2>
        <form action="/download" method="POST">
            <label for="tickers">Masukkan kode saham (pisahkan dengan koma):</label>
            <input type="text" id="tickers" name="tickers" placeholder="Contoh: BBCA.JK, BBRI.JK, TLKM.JK" required>
            <p class="note">*Pastikan menggunakan akhiran <b>.JK</b> untuk saham Bursa Efek Indonesia.</p>
            <button type="submit">⬇️ Download CSV</button>
        </form>
    </div>
    <div style="margin-top: 20px;">
    <a href="/" style="text-decoration: none; color: #007bff;">🏠 Kembali ke Beranda</a>
</div>
</body>
</html>
